    svg.appendChild(setAttr(ns('path'),{d,fill:colors[i%colors.length],stroke:'#fff','stroke-width':2}));
    const ma=angle+slice/2,mlx=cx+(R+25)*Math.cos(ma),mly=cy+(R+25)*Math.sin(ma);
    svg.appendChild(setAttr(ns('text'),{x:mlx,y:mly,fill:'#555','font-size':'10','text-anchor':mlx>cx?'start':'end'}).appendChild(document.createTextNode(labels[i]+' '+(v/total*100).toFixed(0)+'%'))&&null);
    angle+=slice;
  });
  svg.appendChild(setAttr(ns('text'),{x:cx,y:cy-4,'text-anchor':'middle',fill:'#2c3e50','font-size':'13','font-weight':'bold'}).appendChild(document.createTextNode(centerText))&&null);
  svg.appendChild(setAttr(ns('text'),{x:cx,y:cy+14,'text-anchor':'middle',fill:'#2c3e50','font-size':'15','font-weight':'bold'}).appendChild(document.createTextNode(total))&&null);
  c.appendChild(svg);
}

function groupedBar(id,labels,series,opts={}){
  const c=document.getElementById(id);c.innerHTML='';
  const W=opts.w||c.clientWidth||500,H=opts.h||360;
  const ml=opts.ml||10,mr=opts.mr||20,mt=opts.mt||20,mb=opts.mb||55;
  const cw=W-ml-mr,ch=H-mt-mb,n=labels.length;
  const gap=cw/n,serN=series.length,bw=Math.min(20,gap/(serN+1));
  const allV=series.flat();const maxV=Math.max(...allV,1);const scale=ch/maxV;
  const svg=setAttr(ns('svg'),{viewBox:`0 0 ${W} ${H}`,width:W,height:H,style:'display:block'});
  for(let i=0;i<=4;i++){const y=ch-(i*ch/4)+mt;svg.appendChild(setAttr(ns('line'),{x1:ml,x2:ml+cw,y1:y,y2:y,stroke:'#eee','stroke-dasharray':'4,4'}));
    svg.appendChild(setAttr(ns('text'),{x:ml-6,y:y+4,'text-anchor':'end',fill:'#999','font-size':'10'}).appendChild(document.createTextNode((maxV*i/4).toFixed(1)+'%'))&&null);}
  series.forEach((ser,si)=>{
    const col=si===0?'#4e6ef2':si===1?'#f39c12':'#e74c3c';
    ser.forEach((v,i)=>{
      const bh=v*scale,x=ml+(i+0.5)*gap-(serN*bw)/2+si*bw,y=ch-bh+mt;
      svg.appendChild(setAttr(ns('rect'),{x,y,width:bw-2,height:bh,fill:col,rx:3}));
      svg.appendChild(setAttr(ns('text'),{x:x+bw/2-1,y:y-3,'text-anchor':'middle',fill:'#333','font-size':'8',fontWeight:si===2?'bold':''}).appendChild(document.createTextNode(fr(v)))&&null);
    });
  });
  labels.forEach((l,i)=>{
    svg.appendChild(setAttr(ns('text'),{x:ml+(i+0.5)*gap,y:ch+mt+14,'text-anchor':opts.rotate?'end':'middle',fill:'#666','font-size':'9',transform:opts.rotate?`rotate(-20,${ml+(i+0.5)*gap},${ch+mt+14})`:''}).appendChild(document.createTextNode(l))&&null);
  });
  // legend
  const leg=['鐧介绂昏亴鐜?,'鐏伴绂昏亴鐜?,'鎬荤鑱岀巼'],lcol=['#4e6ef2','#f39c12','#e74c3c'];
  leg.forEach((t,i)=>{
    const lx=ml+10+i*80,ly=ch+mt+35;
    svg.appendChild(setAttr(ns('rect'),{x:lx,y:ly-8,width:10,height:10,fill:lcol[i],rx:2}));
    svg.appendChild(setAttr(ns('text'),{x:lx+14,y:ly,fill:'#555','font-size':'9'}).appendChild(document.createTextNode(t))&&null);
  });
  c.appendChild(svg);
}

function heatmapChart(id,rows,cols,data,opts={}){
  const c=document.getElementById(id);c.innerHTML='';
  const W=c.clientWidth||500,H=opts.h||380;
  const ml=90,mr=10,mt=10,mb=60;
  const cw=W-ml-mr,ch=H-mt-mb;
  const cw1=cw/cols.length,ch1=Math.min(ch/rows.length,50);
  const svg=setAttr(ns('svg'),{viewBox:`0 0 ${W} ${H}`,width:W,height:H,style:'display:block'});
  const maxV=Math.max(...data.map(d=>d[2]),5);
  const heatColor=v=>{const r=v/maxV;return r>0.75?'#e74c3c':r>0.5?'#f39c12':r>0.25?'#fef9e7':'#e8f8ef';};
  data.forEach(([ri,ci,v])=>{
    const x=ml+ci*cw1,y=mt+ri*ch1;
    svg.appendChild(setAttr(ns('rect'),{x,y,width:cw1-2,height:ch1-2,fill:v===0?'#f5f5f5':heatColor(v),rx:3}));
    svg.appendChild(setAttr(ns('text'),{x:x+cw1/2,y:y+ch1/2+4,'text-anchor':'middle',fill:v===0?'#ccc':'#fff','font-size':'10','font-weight':'bold'}).appendChild(document.createTextNode(fr(v)))&&null);
  });
  rows.forEach((r,i)=>{svg.appendChild(setAttr(ns('text'),{x:ml-6,y:mt+i*ch1+ch1/2+4,'text-anchor':'end',fill:'#555','font-size':'10'}).appendChild(document.createTextNode(r))&&null);});
  cols.forEach((c,i)=>{svg.appendChild(setAttr(ns('text'),{x:ml+i*cw1+cw1/2,y:mt+rows.length*ch1+14,'text-anchor':'end',fill:'#666','font-size':'8',transform:`rotate(-30,${ml+i*cw1+cw1/2},${mt+rows.length*ch1+14})`}).appendChild(document.createTextNode(c))&&null);});
  c.appendChild(svg);
}

// ========== RENDER ==========
function renderAll(){
  const d=D(),s=d.s;
  
  // KPI
  const hr=lf(d).filter(x=>x.rtR!==null&&x.rtR>=5).length;
  const ar=lf(d).filter(x=>x.rtR!==null&&x.rtR>=3).length;
  const bw=bu(d).reduce((a,b)=>a+b.w,0),bg=bu(d).reduce((a,b)=>a+b.g,0);
  const rw=bu(d).reduce((a,b)=>a+b.rw,0),rg=bu(d).reduce((a,b)=>a+b.rg,0);
  document.getElementById('kpi').innerHTML=
    `<div class="kc blue"><div class="kl">PBU鍦ㄨ亴鎬讳汉鏁?/div><div class="kv">${s.ts}</div><div class="ks">鐧介 ${bw} | 鐏伴 ${bg}</div></div>`+
    `<div class="kc ${s.tr>5?'red':'orange'}"><div class="kl">${d.t}浜烘暟</div><div class="kv">${s.tr}</div><div class="ks">鐧介 ${rw} | 鐏伴 ${rg}</div></div>`+
    `<div class="kc ${s.or>=5?'red':s.or>=3?'orange':'blue'}"><div class="kl">${d.t}鐜?/div><div class="kv">${fr(s.or)}</div><div class="ks">鐧介 ${fr(s.wr)} | 鐏伴 ${fr(s.gr)}</div></div>`+
    `<div class="kc ${hr>0?'red':'orange'}"><div class="kl">楂橀闄╅儴闂?(鈮?%)</div><div class="kv">${hr}</div><div class="kd" style="margin-top:4px">闇€閲嶇偣鍏虫敞</div></div>`+
    `<div class="kc blue"><div class="kl">闇€鍏虫敞閮ㄩ棬 (鈮?%)</div><div class="kv">${ar}</div><div class="ks">鍏?${lf(d).length} 涓儴闂?/div></div>`;

  // Chart 1: Rate bar
  const lfs=lf(d).filter(x=>x.rtR!==null).sort((a,b)=>(b.rtR||0)-(a.rtR||0));
  barChart('c1',lfs.map(x=>{let n=x.d4||x.d3;if(x.bu)n=x.bu+' > '+n;return n;}),lfs.map(x=>x.rtR),{w:680,h:460,ml:10,mr:70,mt:20,mb:20});

  // Chart 2: Donut
  const bs=bu(d);
  donutChart('c2',bs.map(x=>(x.bu||x.d3).replace('鍚堣','').trim()),bs.map(x=>x.t),'鍦ㄨ亴浜烘暟');

  // Chart 3: BU compare
  const bss=bu(d).filter(x=>x.t>0);
  groupedBar('c3',bss.map(x=>{let n=x.d3;if(x.bu)n=x.bu;return n.replace('鍚堣','').trim();}),[bss.map(x=>x.rwR||0),bss.map(x=>x.rgR||0),bss.map(x=>x.rtR||0)],{w:500,h:380,ml:10,mr:20,mt:20,mb:55,rotate:true});

  // Chart 4: Resign type pie
  donutChart('c4',['鐧介绂昏亴','鐏伴绂昏亴'],[rw,rg],'绂昏亴鎬绘暟\n'+s.tr);

  // Chart 5: Staff vs Resign
  const rds=lf(d).filter(x=>x.rt>0).sort((a,b)=>b.t-a.t);
  groupedBar('c5',rds.map(x=>x.d4||x.d3),[rds.map(x=>x.t),rds.map(x=>x.rt)],{w:500,h:400,ml:10,mr:30,mt:20,mb:55,rotate:true});

  // Chart 6: Heatmap
  const regions=['娆ф床涓€鍖?,'娆ф床浜屽尯','娆ф床涓夊尯','鍏朵粬鍖哄煙','鑱岃兘閮ㄩ棬'];
  const deptGroups=[['涓归害鍖?,'鑻卞浗鍖?,'鑽峰叞鍖?],['姣斿埄鏃跺尯','娉曞浗鍖?],['瑗跨彮鐗欏尯','鎰忓ぇ鍒╁尯','鍖堢墮鍒╁尯'],['婢虫床鍖?,'鏃ユ湰鍖?,'鍖楃編鍖?],['缁忚惀绠＄悊閮?,'閿€鍞鏈嶉儴','浜や粯杩愯惀閮?,'PBU鎶€鏈儴','鍥涙捣鎹疯繍椤圭洰閮?]];
  const hdata=[],hcols=[];
  deptGroups.forEach((dgs,ri)=>{dgs.forEach(dn=>{const dept=d.d.find(x=>(x.d4===dn||x.d3===dn)&&!x.s);if(dept&&dept.t>0){hdata.push([ri,hcols.length,dept.rtR||0]);hcols.push(dn);}});});
  heatmapChart('c6',regions,hcols,hdata,{h:400});

  // Table
  let h='<table><thead><tr><th>浜岀骇缁勭粐</th><th>涓夌骇缁勭粐</th><th>鍥涚骇缁勭粐</th><th>鍦ㄨ亴-鐧介</th><th>鍦ㄨ亴-鐏伴</th><th>鍦ㄨ亴-鎬?/th><th>绂昏亴-鐧介</th><th>绂昏亴-鐏伴</th><th>绂昏亴-鎬?/th><th>绂昏亴鐜?鐧介</th><th>绂昏亴鐜?鐏伴</th><th>绂昏亴鐜?鎬?/th></tr></thead><tbody>';
  d.d.forEach(r=>{if(r.t===0&&!r.s)return;let cls=r.ib?'bt':r.s?'st':'';h+=`<tr class="${cls}"><td>${r.bu||''}</td><td>${r.d3}</td><td>${r.d4||'-'}</td><td>${r.w}</td><td>${r.g}</td><td><b>${r.t}</b></td><td>${r.rw}</td><td>${r.rg}</td><td><b>${r.rt}</b></td><td><span class="rb ${rc(r.rwR)}">${fr(r.rwR)}</span></td><td><span class="rb ${rc(r.rgR)}">${fr(r.rgR)}</span></td><td><span class="rb ${rc(r.rtR)}">${fr(r.rtR)}</span></td></tr>`;});
  h+='</tbody></table>';document.getElementById('tb').innerHTML=h;
}

function sw(t){T=t;document.querySelectorAll('.tb').forEach(b=>b.classList.remove('ac'));document.querySelectorAll('.tb').forEach(b=>{if((t==='active'&&b.textContent.includes('涓诲姩'))||(t==='full'&&b.textContent.includes('鍏ㄩ噺')))b.classList.add('ac');});renderAll();}

renderAll();
</script>
